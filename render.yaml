services:
  - type: web
    name: esg-backend
    plan: free
    env: python
    buildCommand: "cd backend && pip install -r requirements.txt && chmod +x entrypoint.sh"
    startCommand: "cd backend && bash entrypoint.sh"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: esg-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "*"

  - type: web
    name: esg-frontend
    env: static
    buildCommand: "cd frontend && npm install && npm run build"
    staticPublishPath: "./frontend/dist"
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  - name: esg-db
    plan: free
    databaseName: esg_db
    user: esg_user
